name: Monthly dashboard update

on:
  schedule:
    - cron: '0 6 3 * *'   # 3-е число каждого месяца, 06:00 UTC (~09:00 МСК)
  workflow_dispatch: {}    # ручной запуск по команде

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live data (Google Sheets CSV export)
        working-directory: generator
        run: |
          set -e
          curl -sL "https://docs.google.com/spreadsheets/d/1rW2eTi6WAfNMsM2w_40DS0cMo58SwGtDvWU8vvZCqe8/export?format=csv&gid=0" -o svod.csv
          curl -sL "https://docs.google.com/spreadsheets/d/1SWX2-_K6q2mbldHgXwO-HjMKUD037mjwVmlMXzIy7dw/export?format=csv&gid=246856888" -o fakt.csv
          # sanity: must be CSV, not an HTML login/redirect page (check header line, not byte count)
          head -1 svod.csv | grep -q "Месяц" || (echo "svod.csv is not CSV — got:"; head -c 200 svod.csv; exit 1)
          head -1 fakt.csv | grep -q "2025" || (echo "fakt.csv is not CSV — got:"; head -c 200 fakt.csv; exit 1)
          echo "svod rows: $(wc -l < svod.csv) | fakt rows: $(wc -l < fakt.csv)"

      - name: Build data.js
        working-directory: generator
        run: python3 build_data.py

      - name: Verify data.js (cross-source checks)
        working-directory: generator
        run: python3 verify_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "Auto-update dashboard data ($(date -u +%Y-%m-%d))"
            git push
            echo "Dashboard data updated."
          fi
